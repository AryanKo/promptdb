name: Auto‑Approve Prompt Submissions

on:
  push:
    paths:
      - 'submissions/*.json'

jobs:
  approve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get pending submission file
        id: changed
        run: |
          FILE=$(ls submissions/*.json 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "No submission files found in submissions/ directory."
            exit 1
          fi
          echo "Found submission: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Validate submission JSON
        id: validate
        env:
          FILE_PATH: ${{ steps.changed.outputs.file }}
        run: |
          if [ -z "$FILE_PATH" ] || [ ! -f "$FILE_PATH" ]; then
            echo "No valid submission file found."
            exit 1
          fi

          jq -e '
            .title and .description and .content and .tags and .timestamp
            and (.title|length) > 3
            and (.description|length) > 10
            and (.content|length) > 10
          ' "$FILE_PATH" > /dev/null || {
            echo "Invalid submission payload"
            exit 1
          }

          BAD_WORDS="badword1|badword2|spam|test"
          if grep -iE "$BAD_WORDS" "$FILE_PATH"; then
            echo "Profanity/Spam detected – rejecting"
            exit 1
          fi

          echo "title=$(jq -r .title "$FILE_PATH")" >> $GITHUB_OUTPUT
          echo "timestamp=$(jq -r .timestamp "$FILE_PATH")" >> $GITHUB_OUTPUT

      - name: Add prompt to prompts.json
        env:
          FILE_PATH: ${{ steps.changed.outputs.file }}
        run: |
          PROMPTS_FILE="src/data/prompts.json"
          if [ ! -f "$PROMPTS_FILE" ]; then
            echo "[]">"$PROMPTS_FILE"
          fi
          TMP=$(mktemp)
          jq -s '.[0] + [.[1] | del(.status)]' "$PROMPTS_FILE" "$FILE_PATH" > "$TMP" && mv "$TMP" "$PROMPTS_FILE"

      - name: Create branch & commit
        id: branch
        run: |
          git config user.name "PromptDB Bot"
          git config user.email "promptdb-bot@users.noreply.github.com"
          BRANCH="approve-prompt-${{ github.sha }}"
          git checkout -b "$BRANCH"
          git add src/data/prompts.json
          git commit -m "Approve prompt: ${{ steps.validate.outputs.title }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Approve prompt: ${{ steps.validate.outputs.title }}" \
            --body "Auto-generated PR that moves a user-submitted prompt from \`submissions/\` to the public \`prompts.json\`.

          - **Submitted by:** (anonymous)
          - **Timestamp:** ${{ steps.validate.outputs.timestamp }}"
