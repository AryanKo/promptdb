name: Auto‑Approve Prompt Submissions

on:
  push:
    paths:
      - 'submissions/*.json'

jobs:
  approve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Process submissions
        id: process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPTS_FILE="src/data/prompts.json"
          if [ ! -f "$PROMPTS_FILE" ]; then echo "[]" > "$PROMPTS_FILE"; fi
          
          # Find all json files
          FILES=$(ls submissions/*.json 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No submission files found."
            exit 0
          fi
          
          git config user.name "PromptDB Bot"
          git config user.email "promptdb-bot@users.noreply.github.com"
          BRANCH="approve-prompts-${{ github.sha }}"
          git checkout -b "$BRANCH"
          
          PROCESSED_COUNT=0
          
          for FILE_PATH in $FILES; do
            echo "Processing $FILE_PATH"
            
            # Validate
            if ! jq -e '
              .title and .description and .content and .tags and .timestamp
              and (.title|length) > 3
              and (.description|length) > 10
              and (.content|length) > 10
            ' "$FILE_PATH" > /dev/null; then
              echo "Invalid submission payload in $FILE_PATH"
              git rm -f "$FILE_PATH"
              continue
            fi
            
            # BAD_WORDS fix
            BAD_WORDS="\bbadword1\b|\bbadword2\b|\bspam\b"
            if grep -iE "$BAD_WORDS" "$FILE_PATH"; then
              echo "Profanity/Spam detected – rejecting $FILE_PATH"
              git rm -f "$FILE_PATH"
              continue
            fi
            
            # Append to prompts.json
            TMP=$(mktemp)
            jq -s '.[0] + [.[1] | del(.status)]' "$PROMPTS_FILE" "$FILE_PATH" > "$TMP" && mv "$TMP" "$PROMPTS_FILE"
            
            git rm -f "$FILE_PATH"
            PROCESSED_COUNT=$((PROCESSED_COUNT+1))
          done
          
          if [ "$PROCESSED_COUNT" -gt 0 ]; then
             git add src/data/prompts.json
             git commit -m "Process $PROCESSED_COUNT prompt submission(s)"
             git push origin "$BRANCH"
             
             BODY=$(cat << 'EOF'
          Auto-generated PR that moves user-submitted prompts from `submissions/` to the public `prompts.json`.
          
          - **Submitted by:** (anonymous contributors)
          EOF
          )
             gh pr create --base main --head "$BRANCH" --title "Approve $PROCESSED_COUNT new prompt(s)" --body "$BODY"
          else
             if ! git diff --cached --quiet; then
               git commit -m "Remove invalid prompt submissions"
               git push origin "$BRANCH"
               gh pr create --base main --head "$BRANCH" --title "Remove invalid submissions" --body "Removed submissions that failed validation."
             fi
          fi
